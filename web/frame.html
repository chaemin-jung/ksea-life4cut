<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#ECECEC;
font-family:Poppins;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
}

h1{
font-size:42px;
margin-bottom:60px;
}

.frames{
display:flex;
gap:80px;
}

.frame{
width:220px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>Select Frame</h1>

<div class="frames">

<img src="/assets/frame1.png"
class="frame"
onclick="selectFrame('frame1.png')">

<img src="/assets/frame2.png"
class="frame"
onclick="selectFrame('frame2.png')">

</div>

<script>

let selecting=false

async function selectFrame(name){

if(selecting) return
selecting=true

try{

const res=await fetch("/select_frame",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({frame:name})
})

const data=await res.json()

if(data.ok){

location.href="/capture"
return

}

}catch(err){

console.log("network issue")

}

setTimeout(()=>{
location.href="/capture"
},2000)

}

</script>

</body>
</html>
