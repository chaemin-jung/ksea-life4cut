<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#ECECEC;
font-family:Poppins;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
overflow:hidden;
}

/* -------- FRAME SELECT -------- */

h1{
font-size:50px;
margin-bottom:60px;
}

.frames{
display:flex;
gap:80px;
}

.frame{
width:260px;
cursor:pointer;
transition:0.2s;
}

.frame:hover{
transform:scale(1.08);
}

#copy-select{
display:none;
margin-top:40px;
text-align:center;
}

button{
font-size:24px;
padding:15px 30px;
margin:10px;
border:none;
border-radius:10px;
cursor:pointer;
}

/* -------- CAPTURE UI -------- */

#capture-ui{
display:none;
width:100%;
height:100vh;
}

.header{
display:flex;
justify-content:space-between;
padding:40px 60px;
}

.title{
font-size:54px;
font-weight:800;
}

.subtitle{
font-size:32px;
color:#777;
}

.main{
display:flex;
justify-content:center;
align-items:center;
gap:40px;
height:calc(100vh - 140px);
}

.camera{
background:#ccc;
padding:20px;
border-radius:20px;
position:relative;

/* ⭐ 추가 */
width:65vw;
height:70vh;
overflow:hidden;

display:flex;
align-items:center;
justify-content:center;
}

#preview{
width:100%;
height:100%;
object-fit:cover;   /* ⭐ 핵심 */
border-radius:10px;
}

.flash{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:white;
opacity:0;
border-radius:10px;
}

.count{
position:absolute;
bottom:30px;
left:50%;
transform:translateX(-50%);
font-size:10vh;
font-weight:800;
color:white;
text-shadow:3px 3px 0 #000;
}

.progress{
text-align:center;
font-size:72px;
margin-top:20px;
}

.side{
display:flex;
flex-direction:column;
gap:20px;
}

.slot{
width:120px;
height:90px;
border:4px solid black;
background:white;
}

.slot img{
width:100%;
height:100%;
object-fit:cover;
}

</style>

</head>

<body>

<h1 id="title">Select Frame</h1>

<div class="frames" id="frame-section">

<img src="/assets/frame1.png" class="frame" onclick="selectFrame('frame1.png')">
<img src="/assets/frame2.png" class="frame" onclick="selectFrame('frame2.png')">
<img src="/assets/frame3.png" class="frame" onclick="selectFrame('frame3.png')">
<img src="/assets/frame4.png" class="frame" onclick="selectFrame('frame4.png')">

</div>

<div id="copy-select">
<h2>Select Copies</h2>

<button onclick="selectCopies(2)">2 Copies</button>
<button onclick="selectCopies(4)">4 Copies</button>
<button onclick="selectCopies(6)">6 Copies</button>

</div>

<div id="capture-ui">

<div class="header">
<div class="title">KSEA4CUTS</div>
<div class="subtitle">Taking Photos</div>
</div>

<div class="main">

<div>

<div class="camera">
<img id="preview" src="/preview">
<div id="flash" class="flash"></div>
<div id="count" class="count"></div>
</div>

<div id="progress" class="progress">READY</div>

</div>

<div class="side">
<div class="slot" id="s1"></div>
<div class="slot" id="s2"></div>
<div class="slot" id="s3"></div>
<div class="slot" id="s4"></div>
</div>

</div>

</div>

<audio id="shutter" src="/assets/shutter.mp3"></audio>

<script>

let lastShot = 0;
let captureStarting = false;   // 🔥 버튼 연타 방지

/* -------- FRAME -------- */

async function selectFrame(name){

    await fetch("/select_frame",{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify({frame:name})
    });

    document.getElementById("copy-select").style.display="block";
}

/* -------- COPIES -------- */

function selectCopies(n){

    if(captureStarting) return;
    captureStarting = true;

    // 🔥 버튼 비활성화
    const buttons = document.querySelectorAll("#copy-select button");
    buttons.forEach(btn => {
        btn.disabled = true;
        btn.style.opacity = "0.5";
    });

    fetch("/set_copies",{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify({ copies:n })
    });

    startCapture();
}

/* -------- START CAPTURE -------- */

function startCapture(){

    lastShot = 0;

    if(window.polling){
        clearInterval(window.polling);
    }

    // 🔥 UI 초기화
    document.getElementById("count").innerText = "";
    document.getElementById("progress").innerText = "READY";
    document.getElementById("s1").innerHTML = "";
    document.getElementById("s2").innerHTML = "";
    document.getElementById("s3").innerHTML = "";
    document.getElementById("s4").innerHTML = "";

    // UI 전환
    document.getElementById("frame-section").style.display="none";
    document.getElementById("copy-select").style.display="none";
    document.getElementById("title").style.display="none";
    document.getElementById("capture-ui").style.display="block";

    // 시작
    setTimeout(()=>{
        document.getElementById("progress").innerText="1/4";
        fetch("/start_capture");
    },3000);

    window.polling = setInterval(update,200);
}

/* -------- UPDATE -------- */

function update(){

    fetch("/status")
    .then(r=>r.json())
    .then(data=>{

        if(data.countdown>0)
            document.getElementById("count").innerText=data.countdown
        else
            document.getElementById("count").innerText=""

        if(data.shot>lastShot){

            let n=data.shot

            document.getElementById("s"+n).innerHTML=
            "<img src='/outputs/shot"+(n-1)+".jpg?"+Date.now()+"'>"

            if(n<4)
                document.getElementById("progress").innerText=(n+1)+"/4"
            else
                document.getElementById("progress").innerText="4/4"

            lastShot=n
        }

        if(data.done){
            clearInterval(window.polling)
            setTimeout(()=>{
                location.href="/thanks"
            },1500)
        }

    })
}

</script>

</body>
</html>
