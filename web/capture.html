<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width">

<style>

body{
margin:0;
background:#ECECEC;
font-family:Inter, Arial;
}

.container{
display:flex;
flex-direction:column;
height:100vh;
padding:40px;
}

.header{
display:flex;
justify-content:space-between;
}

.title{
font-size:40px;
font-weight:700;
}

.subtitle{
font-size:26px;
color:#777;
}

.main{
flex:1;
display:flex;
align-items:center;
justify-content:center;
gap:80px;
}

.camera-box{
background:#CFCFCF;
padding:25px;
border-radius:20px;
position:relative;
}

#preview{
width:950px;
height:640px;
background:black;
object-fit:cover;
}

.countdown{
position:absolute;
bottom:30px;
left:0;
right:0;
text-align:center;
font-size:120px;
color:white;
font-weight:800;
}

.progress{
text-align:center;
font-size:48px;
font-weight:700;
margin-top:10px;
}

.side{
display:flex;
flex-direction:column;
gap:20px;
}

.thumb{
width:130px;
height:100px;
border:5px solid black;
background:#ddd;
object-fit:cover;
}

</style>

</head>

<body>

<div class="container">

<div class="header">

<div class="title">KSEA4CUTS</div>
<div class="subtitle">Taking Photos</div>

</div>

<div class="main">

<div>

<div class="camera-box">

<img id="preview" src="/preview">

<div id="count" class="countdown"></div>

</div>

<div id="progress" class="progress">1/4</div>

</div>

<div class="side">

<img class="thumb" id="t1">
<img class="thumb" id="t2">
<img class="thumb" id="t3">
<img class="thumb" id="t4">

</div>

</div>

</div>

<script>

setTimeout(()=>{
fetch("/start_capture")
},3000)

function update(){

fetch("/status")
.then(r=>r.json())
.then(data=>{

if(data.countdown>0){

document.getElementById("count").innerText=data.countdown

}

if(data.shot>0){

document.getElementById("progress").innerText=data.shot+"/4"

document.getElementById("t"+data.shot).src=
"/outputs/shot"+(data.shot-1)+".jpg"

}

if(data.done){

location.href="thanks.html"

}

})

}

setInterval(update,200)

</script>

</body>
</html>
