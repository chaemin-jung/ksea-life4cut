<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#ECECEC;
font-family:Poppins;
}

.header{
display:flex;
justify-content:space-between;
padding:40px 60px;
}

.title{
font-size:54px;
font-weight:800;
}

.subtitle{
font-size:32px;
color:#777;
}

.main{
display:flex;
justify-content:center;
gap:80px;
}

.camera{
background:#ccc;
padding:25px;
border-radius:20px;
position:relative;
}

#preview{
width:900px;
height:675px;
object-fit:cover;
border-radius:10px;
transition:filter .2s;
}

.flash{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:white;
opacity:0;
pointer-events:none;
border-radius:10px;
}

.count{
position:absolute;
bottom:30px;
left:50%;
transform:translateX(-50%);
font-size:150px;
font-weight:800;
color:white;
text-shadow:
3px 3px 0 #000,
-3px 3px 0 #000,
3px -3px 0 #000,
-3px -3px 0 #000;
}

.progress{
text-align:center;
font-size:72px;
margin-top:20px;
}

.side{
display:flex;
flex-direction:column;
gap:30px;
}

.slot{
width:180px;
height:140px;
border:6px solid black;
background:white;
}

.slot img{
width:100%;
height:100%;
object-fit:cover;
}

</style>

</head>

<body>

<div class="header">

<div class="title">KSEA4CUTS</div>
<div class="subtitle">Taking Photos</div>

</div>

<div class="main">

<div>

<div class="camera">

<img id="preview" src="/preview">

<div id="flash" class="flash"></div>

<div id="count" class="count"></div>

</div>

<div id="progress" class="progress">READY</div>

</div>

<div class="side">

<div class="slot" id="s1"></div>
<div class="slot" id="s2"></div>
<div class="slot" id="s3"></div>
<div class="slot" id="s4"></div>

</div>

</div>

<audio id="shutter" src="/assets/shutter.mp3"></audio>

<script>

const shutter=document.getElementById("shutter")
const flash=document.getElementById("flash")
const preview=document.getElementById("preview")

let lastShot=0

/* READY 3초 */

setTimeout(()=>{

document.getElementById("progress").innerText="1/4"

fetch("/start_capture")

},3000)


function flashEffect(){

flash.style.opacity=1

setTimeout(()=>{
flash.style.opacity=0
},120)

preview.style.filter="brightness(0.3)"

setTimeout(()=>{
preview.style.filter="none"
},500)

}


function update(){

fetch("/status")
.then(r=>r.json())
.then(data=>{

/* countdown */

if(data.countdown>0)
document.getElementById("count").innerText=data.countdown
else
document.getElementById("count").innerText=""

/* new shot */

if(data.shot>lastShot){

let n=data.shot

/* shutter */

shutter.currentTime=0
shutter.play()

flashEffect()

/* preview */

document.getElementById("s"+n).innerHTML=
"<img src='/outputs/shot"+(n-1)+".jpg?"+Date.now()+"'>"

/* progress */

if(n<4)
document.getElementById("progress").innerText=(n+1)+"/4"
else
document.getElementById("progress").innerText="4/4"

lastShot=n

}

/* finished */

if(data.done){

setTimeout(()=>{
location.href="/thanks"
},1500)

}

})

}

/* status polling */

setInterval(update,200)

</script>

</body>

</html>
